<!DOCTYPE html>
<html lang="es">
<head>
    <!-- INTEGRACION DEL FRAMEWORK BOOTSTRAP PARA DISEÑO Y ESTILO WEB -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Design</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Favicon -->
    <link rel="icon" href="assets/img/icon.png" type="image/png">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="row mt-4">
        <div class="col-md-12 bg-primary text-white text-center p-3">
            <h1><b>Profile Card Design</b></h1>
        </div>
    </div>

    <!-- SECCION CARDS -->
    <div class="row justify-content-center py-5" style="background-color: #e3e3e3;">

        <!-- CARD 1 -->
        <div class="col-md-3 m-3 bg-white text-center p-4 shadow" style="border-radius: 20px;">
            
            <img src="assets/img/per1.jpg" 
                 class="img-fluid rounded-circle mb-3"
                 style="height:150px; width:150px; object-fit:cover;">

            <h4><b>Person One</b></h4>

            <p>
                Esta es persona número uno,
                para revisar la tarjeta de información.
            </p>

            <img src="assets/img/redes.jpg"
                 class="img-fluid"
                 style="height:40px; width:150px;">
        </div>

        <!-- CARD 2 -->
        <div class="col-md-3 m-3 bg-white text-center p-4 shadow" style="border-radius: 20px;">
            
            <img src="assets/img/per2.jpg" 
                 class="img-fluid rounded-circle mb-3"
                 style="height:150px; width:150px; object-fit:cover;">

            <h4><b>Person Two</b></h4>

            <p>
                Esta es persona número dos,
                para revisar la tarjeta de información.
            </p>

            <img src="assets/img/redes.jpg"
                 class="img-fluid"
                 style="height:40px; width:150px;">
        </div>

        <!-- CARD 3 -->
        <div class="col-md-3 m-3 bg-white text-center p-4 shadow" style="border-radius: 20px;">
            
            <img src="assets/img/per3.jpg" 
                 class="img-fluid rounded-circle mb-3"
                 style="height:150px; width:150px; object-fit:cover;">

            <h4><b>Person Three</b></h4>

            <p>
                Esta es persona número tres,
                para revisar la tarjeta de información.
            </p>

            <img src="assets/img/redes.jpg"
                 class="img-fluid"
                 style="height:40px; width:150px;">
        </div>

    </div>

    <!-- FOOTER -->
    <div class="row">
        <div class="col-md-12 bg-secondary text-white text-center p-3">
            <h2>HTML CSS BOOTSTRAP</h2>
        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
